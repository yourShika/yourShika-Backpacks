# ============================================================================
#  yourShika Backpack's – Messages (English)
#  Supports MiniMessage AND legacy &-color codes. Placeholders: <name>
# ============================================================================

prefix: "<gradient:#6E5BC8:#5BE8D4><bold>Backpacks</bold></gradient> <dark_gray>»</dark_gray> "

help:
  header: "<gradient:#6E5BC8:#5BE8D4><bold>yourShika Backpack's</bold></gradient> <gray>– Commands"
  open: "<yellow>/bp open <gray>– Open the backpack in your hand"
  info: "<yellow>/bp info <gray>– View backpacks, upgrades & recipes"
  achievements: "<yellow>/bp achievements <gray>– View your backpack achievements"
  rename: "<yellow>/bp rename <name|reset> <gray>– Rename the backpack in your hand"
  color: "<yellow>/bp color <color> [accent] <gray>– Dye a backpack (name or #RRGGBB)"
  list: "<yellow>/bp list [player] <gray>– List backpacks (clickable)"
  locate: "<yellow>/bp locate [player|id] <gray>– Show coordinates of placed backpacks"
  transfer: "<yellow>/bp transfer <id> <player> <gray>– Transfer ownership of a backpack"
  recall: "<yellow>/bp recall <gray>– Recall your placed backpacks (needs Recall Upgrade)"
  magnet: "<yellow>/bp magnet <on|off> <gray>– Toggle the magnet pull"
  give: "<yellow>/bp give <player> <tier> [amount] [color] [accent] <gray>– Give a backpack"
  openid: "<yellow>/bp openid <id> <gray>– Open a backpack by ID"
  modules: "<yellow>/bp modules <gray>– Toggle external modules"
  assets: "<yellow>/bp assets <status|redeploy> <gray>– Oraxen asset status / redeploy"
  doctor: "<yellow>/bp doctor <gray>– Diagnostics (Oraxen, config, DB, assets, versions)"
  update: "<yellow>/bp update <gray>– Download the latest version from GitHub"
  reload: "<yellow>/bp reload <gray>– Reload the configuration"
  footer: "<dark_gray>Inspired by Sophisticated Backpacks – a standalone server plugin."

