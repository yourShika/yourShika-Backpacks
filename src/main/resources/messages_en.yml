  id-not-found: "<red>No backpack found with that ID."
  invalid-id: "<red>Invalid ID: <white><input></white>"
  world-disabled: "<red>Backpacks are disabled in this world."
  no-nesting: "<red>Backpacks cannot be placed inside backpacks."
  unknown-subcommand: "<red>Unknown command: <white><input></white> <gray>– /bp help"
  color-usage: "<red>Usage: /bp color <color> [accent] <gray>(name or #RRGGBB)"
  give-usage: "<red>Usage: /bp give <player> <tier> [amount] [color] [accent]"
