# ============================================================================
#  yourShika Backpack's – Konfiguration
#  Datenordner: plugins/yourShika Backpack's/
#  Standardsprache: Deutsch (de)
# ============================================================================

# Sprache der messages_<sprache>.yml (Standard: de).
language: de

# Debug-Ausgaben in der Server-Konsole.
debug: false

# ---------------------------------------------------------------------------
#  Speicherung
# ---------------------------------------------------------------------------
storage:
  # SQLITE (empfohlen) oder YAML.
  type: SQLITE
  autosave:
    enabled: true
    interval-minutes: 5

# ---------------------------------------------------------------------------
#  Öffnen
# ---------------------------------------------------------------------------
open:
  right-click: true   # Rechtsklick mit Backpack in der Hand
  offhand: true       # auch aus der Nebenhand

# ---------------------------------------------------------------------------
#  Crafting (global). Einzelne Tier-Rezepte werden unten je Tier aktiviert.
# ---------------------------------------------------------------------------
crafting:
  enabled: true

# ---------------------------------------------------------------------------
#  Sicherheit
# ---------------------------------------------------------------------------
security:
  # Backpacks in Backpacks. Für 0.0.1 dringend auf false lassen (Dupe-Schutz).
  # Später optional über das geplante "Inception Upgrade".
  allow-nesting: false

# ---------------------------------------------------------------------------
#  Welten-Filter
#  Ist eine Whitelist gesetzt, gelten NUR diese Welten. Sonst greift die
#  Blacklist. Beide leer = überall erlaubt.
# ---------------------------------------------------------------------------
worlds:
  whitelist: []
  blacklist: []

# ---------------------------------------------------------------------------
#  Platzierbare Backpacks (Roadmap)
#  In 0.0.1 deaktiviert. Vorbereitet für eine spätere BlockDisplay-/Barrel-
#  basierte Umsetzung. Siehe README -> Roadmap.
# ---------------------------------------------------------------------------
placeable:
  enabled: false
  hopper:
    allow-insert: false
    allow-extract: false
    owner-only: true
  protect-from-explosions: true

# ---------------------------------------------------------------------------
#  Backpack-Tiers
#  - material:          Basis-Item (ohne Resourcepack sichtbar)
#  - custom-model-data: für spätere Custom-Texturen / Resourcepacks
#  - storage-rows:      Lager-Reihen (1-5) -> nutzbare Slots = Reihen * 9
#  - upgrade-slots:     vorbereitete Upgrade-Slots (in 0.0.1 gesperrt)
#  - default-*-color:   DyeColor (z.B. RED, BLUE, BROWN, ORANGE ...)
#  - recipe:            optionales, eigenes Crafting-Rezept
#
#  Lore-/Name-Platzhalter: <storage> <upgrades> <id> <main_color> <accent_color>
# ---------------------------------------------------------------------------
tiers:
