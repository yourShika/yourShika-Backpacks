    price: 0.0
    lore:
      - "<gray>Lager: <white><storage> Slots"
      - "<gray>Upgrade-Slots: <white><upgrades> <dark_gray>(Roadmap)"
      - "<gray>Farbe: <main_color> <dark_gray>/</dark_gray> <accent_color>"
      - ""
      - "<yellow>Rechtsklick zum Öffnen"
      - "<dark_gray>ID: <id>"
