# ---------------------------------------------------------------------------
#  Upgrades (Roadmap / vorbereitet)
#  Noch nicht funktionsfähig. Dieser Abschnitt dient als Grundlage für spätere
#  Versionen. Siehe README -> Upgrade-Roadmap.
# ---------------------------------------------------------------------------
upgrades:
  enabled: false
  definitions:
    pickup:
      enabled: false
      permission: "yourshika.backpack.upgrade.pickup"
      custom-model-data: 2001
    magnet:
      enabled: false
      permission: "yourshika.backpack.upgrade.magnet"
      custom-model-data: 2002
    void:
      enabled: false
      permission: "yourshika.backpack.upgrade.void"
      custom-model-data: 2003
    # ... weitere Upgrades folgen (Filter, Compacting, Smelting, Stack, ...).

# ---------------------------------------------------------------------------
#  Externe Module / Hooks (EXPERIMENTELL)
#
#  Master-Schalter: hooks.experimental
#    - false (Standard): KEIN externes Modul lädt – egal, was unten steht.
#      Das Plugin läuft vollständig eigenständig mit Vanilla-Items.
#    - true: Module dürfen laden, sofern sie zusätzlich einzeln aktiviert
#      sind UND das jeweilige Plugin installiert ist.
#
#  Status & Verfügbarkeit jederzeit im Spiel sichtbar über: /bp modules
#  Vault wird bewusst nicht mehr unterstützt.
# ---------------------------------------------------------------------------
hooks:
  experimental: false
  modules:
    placeholderapi: false   # Platzhalter (%ysbp_*%)
    protocollib: false      # Fake-Blocks für platzierte Backpacks (Roadmap)
    nexo: false             # Custom-Modelle/Texturen (empfohlener Oraxen-Nachfolger)
    itemsadder: false       # Custom-Modelle/Texturen
    oraxen: false           # Custom-Modelle/Texturen (Legacy)
