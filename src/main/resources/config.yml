# ============================================================================
#  yourShika Backpack's – Konfiguration
#  Datenordner: plugins/yourShika Backpack's/
#  Zielplattform: Paper 26.1.2 (Java 25)
#  Standardsprache: Deutsch (de)
# ============================================================================

# Sprache der messages_<sprache>.yml (Standard: de).
language: de

# Debug-Ausgaben in der Server-Konsole.
debug: false

# ---------------------------------------------------------------------------
#  Speicherung
# ---------------------------------------------------------------------------
storage:
  # SQLITE (empfohlen) oder YAML.
  type: SQLITE
  autosave:
    enabled: true
    interval-minutes: 5

# ---------------------------------------------------------------------------
#  GUI
#  Jedes Backpack öffnet als Doppeltruhe (54 Slots). Nur die für den Tier
#  freigegebenen Felder sind nutzbar, der Rest ist gesperrt. Tiers mit mehr
#  Lager-Slots als auf eine Seite passen, werden automatisch über mehrere
#  Seiten geblättert (Paging).
# ---------------------------------------------------------------------------
gui:
  # Nutzbare Lager-Slots pro Seite (1-45). Die unterste Reihe (9 Slots) bleibt
  # immer für Steuerung (Blättern, Info, Upgrade-Vorschau) reserviert.
  storage-slots-per-page: 45

# ---------------------------------------------------------------------------
#  Öffnen
# ---------------------------------------------------------------------------
open:
  right-click: true   # Rechtsklick mit Backpack in der Hand
  offhand: true       # auch aus der Nebenhand

# ---------------------------------------------------------------------------
#  Crafting (global). Einzelne Tier-Rezepte werden unten je Tier aktiviert.
# ---------------------------------------------------------------------------
crafting:
  enabled: true

# ---------------------------------------------------------------------------
#  Sicherheit
# ---------------------------------------------------------------------------
security:
  # Backpacks in Backpacks. Dringend auf false lassen (Dupe-Schutz).
  # Später optional über das geplante "Inception Upgrade".
  allow-nesting: false

# ---------------------------------------------------------------------------
#  Welten-Filter
#  Ist eine Whitelist gesetzt, gelten NUR diese Welten. Sonst greift die
#  Blacklist. Beide leer = überall erlaubt.
# ---------------------------------------------------------------------------
worlds:
  whitelist: []
  blacklist: []

# ---------------------------------------------------------------------------
#  Platzierbare Backpacks (Roadmap)
#  Deaktiviert. Vorbereitet für eine spätere BlockDisplay-/Barrel-basierte
#  Umsetzung. Siehe README -> Roadmap.
# ---------------------------------------------------------------------------
placeable:
  enabled: false
  hopper:
    allow-insert: false
    allow-extract: false
    owner-only: true
  protect-from-explosions: true

# ---------------------------------------------------------------------------
#  Backpack-Tiers
#  - material:          Basis-Item. Standard: LEATHER_HORSE_ARMOR – ein
#                       färbbares Leder-Item, das auch ohne Resourcepack die
#                       eingestellte Farbe sichtbar annimmt und nicht
#                       anziehbar ist. Jedes färbbare Leder-Item ist möglich
#                       (LEATHER_HELMET/CHESTPLATE/LEGGINGS/BOOTS/HORSE_ARMOR).
#  - storage-slots:     Nutzbare Lager-Slots insgesamt. Darf 45 (eine Seite)
#                       übersteigen – dann wird automatisch geblättert.
#  - upgrade-slots:     Vorbereitete Upgrade-Slots (aktuell gesperrt/Roadmap).
#  - default-main-color / default-accent-color:
#                       DyeColor-Name (z.B. BROWN) ODER Hex (#A0703C).
#                       Die Hauptfarbe färbt das Leder-Item real ein.
#  - custom-model-data: für klassische Resourcepacks.
#  - item-model:        moderne item_model-Component (z.B. "yourshika:leather_backpack").
#  - provider-id:       optionale Custom-Item-ID für ein externes Modul
#                       (Nexo/ItemsAdder/Oraxen) – greift nur, wenn das Modul
#                       experimentell aktiviert ist (siehe modules unten).
#  - recipe:            optionales, eigenes Crafting-Rezept.
#
#  Lore-/Name-Platzhalter: <storage> <pages> <upgrades> <id> <main_color> <accent_color>
# ---------------------------------------------------------------------------
tiers:
  leather:
    display-name: "<#A0703C>Leder-Rucksack</#A0703C>"
    material: LEATHER_HORSE_ARMOR
    custom-model-data: 1001
    item-model: ""
    provider-id: ""
    storage-slots: 9
    upgrade-slots: 1
    default-main-color: "#A0703C"
    default-accent-color: "#E08A2B"
    permission: ""
    lore:
      - "<gray>Lager: <white><storage> Slots <dark_gray>(<pages> Seite/n)"
      - "<gray>Upgrade-Slots: <white><upgrades> <dark_gray>(Roadmap)"
      - "<gray>Farbe: <main_color> <dark_gray>/</dark_gray> <accent_color>"
      - ""
      - "<yellow>Rechtsklick zum Öffnen"
      - "<dark_gray>ID: <id>"
    recipe:
      enabled: true
      shape:
        - "LLL"
        - "LCL"
        - "LLL"
      ingredients:
        L: LEATHER
        C: CHEST

