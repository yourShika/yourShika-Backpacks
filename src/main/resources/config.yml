# ---------------------------------------------------------------------------
#  Upgrade-System (Tier-Kette)
#  Leder → Copper → Eisen → Gold → Diamant → Smaragd → Netherite
#
#  - "Upgrade-Leder": Leder + Faden (Crafting Table).
#  - Tier-Upgrade (copper…emerald): Upgrade-Leder + 8× Tier-Material.
#    Netherite-Upgrade: Upgrade-Leder + 1 Netherite-Ingot (günstig, Crafting
#    Table – im Smithing Table sind technisch nur 3 Slots möglich).
#  - Backpack-Veredelung im Smithing Table:
#    Leder (Template) + vorheriges Backpack (Basis) + Tier-Upgrade (Zugabe)
#    → nächstes Backpack, UNTER ERHALT von ID, Inhalt und Farbe.
#
#  Über "materials" lässt sich das je Tier benötigte Material anpassen.
# ---------------------------------------------------------------------------
upgrades:
  enabled: true
  materials:
    copper: COPPER_INGOT
    iron: IRON_INGOT
    gold: GOLD_INGOT
    diamond: DIAMOND
    emerald: EMERALD
    netherite: NETHERITE_INGOT
  # Crafting-Rezept der Tier-Upgrades (außer Netherite): 'M' = Tier-Material
  # (siehe materials oben), 'U' = Upgrade-Leder. Standard: 8x Material um das Leder.
  tier-recipe:
    shape:
      - "MMM"
      - "MUM"
      - "MMM"
  # Smithing-Rezepte (Smithing Table) – frei konfigurierbar.
  smithing:
    # Veredelung eines Backpacks zum nächsten Tier:
    #   template (Vorlage) + vorheriges Backpack (Basis) + Tier-Upgrade (Zugabe).
    template-material: LEATHER
    # Netherite-Tier-Upgrade wird per Smithing erstellt:
    #   Upgrade-Leder (Vorlage) + base-material (Basis) + addition-material (Zugabe).
    netherite:
      base-material: NETHERITE_INGOT
      addition-material: STRING
  # CustomModelData / item_model der Upgrade-Items – vorbereitet für eigene
  # Texturen via Resourcepack. 'base' = Upgrade-Leder, dann je Ziel-Tier.
  # provider-id nutzt aktive Custom-Item-Module wie Oraxen; item-model leer
  # lassen, wenn kein modernes item_model direkt gesetzt werden soll.
  models:
    base:      { custom-model-data: 2000, item-model: "", provider-id: "ysbp_upgrade_base" }
    copper:    { custom-model-data: 2001, item-model: "", provider-id: "ysbp_upgrade_copper" }
    iron:      { custom-model-data: 2002, item-model: "", provider-id: "ysbp_upgrade_iron" }
    gold:      { custom-model-data: 2003, item-model: "", provider-id: "ysbp_upgrade_gold" }
    diamond:   { custom-model-data: 2004, item-model: "", provider-id: "ysbp_upgrade_diamond" }
    emerald:   { custom-model-data: 2005, item-model: "", provider-id: "ysbp_upgrade_emerald" }
    netherite: { custom-model-data: 2006, item-model: "", provider-id: "ysbp_upgrade_netherite" }
  # Functional upgrades that are installed INTO a backpack (via its Upgrades menu).
  # Each has a fair crafting recipe ('U' = Upgrade Leather). Models are prepared
  # for Oraxen/Resourcepacks via custom-model-data / provider-id.
  functions:
    enabled: true
    models:
      pickup:          { custom-model-data: 2100, item-model: "", provider-id: "ysbp_upgrade_pickup" }
      advanced_pickup: { custom-model-data: 2101, item-model: "", provider-id: "ysbp_upgrade_advanced_pickup" }
      magnet:          { custom-model-data: 2102, item-model: "", provider-id: "ysbp_upgrade_magnet" }
      advanced_magnet: { custom-model-data: 2103, item-model: "", provider-id: "ysbp_upgrade_advanced_magnet" }
      crafting:        { custom-model-data: 2114, item-model: "", provider-id: "ysbp_upgrade_crafting" }
      compacting:      { custom-model-data: 2115, item-model: "", provider-id: "ysbp_upgrade_compacting" }
      smelting:        { custom-model-data: 2117, item-model: "", provider-id: "ysbp_upgrade_smelting" }
      smoking:         { custom-model-data: 2119, item-model: "", provider-id: "ysbp_upgrade_smoking" }
      blasting:        { custom-model-data: 2121, item-model: "", provider-id: "ysbp_upgrade_blasting" }
      stonecutter:     { custom-model-data: 2123, item-model: "", provider-id: "ysbp_upgrade_stonecutter" }
      smithing:        { custom-model-data: 2125, item-model: "", provider-id: "ysbp_upgrade_smithing" }
      ender_link:      { custom-model-data: 2150, item-model: "", provider-id: "ysbp_upgrade_ender_link" }
      recall:          { custom-model-data: 2151, item-model: "", provider-id: "ysbp_upgrade_recall" }
      trash:           { custom-model-data: 2152, item-model: "", provider-id: "ysbp_upgrade_trash" }
      everlasting:     { custom-model-data: 2144, item-model: "", provider-id: "ysbp_upgrade_everlasting" }
    # Crafting-Rezepte der Funktions-Upgrades – frei konfigurierbar.
    # 'U' = Upgrade-Leder (Pflicht), 'X' = das vorausgesetzte Basis-Upgrade
    # (z.B. braucht Advanced Pickup zuerst ein Pickup Upgrade). Alle anderen
    # Buchstaben verweisen auf Vanilla-Materialien (ingredients). Fehlt ein
    # Eintrag, gilt das eingebaute Standard-Rezept.
    recipes:
      pickup:
        shape: [" H ", "RUR", " C "]
        ingredients: { H: HOPPER, R: REDSTONE, C: CHEST }
      advanced_pickup:
        shape: [" E ", "EXE", " E "]
        ingredients: { E: ENDER_PEARL }
      magnet:
        shape: ["IRI", "RUR", "IRI"]
        ingredients: { I: IRON_INGOT, R: REDSTONE }
      advanced_magnet:
        shape: [" D ", "DXD", " D "]
        ingredients: { D: DIAMOND }
      crafting:
        shape: ["PPP", "PUP", "PPP"]
        ingredients: { P: OAK_PLANKS }
      stonecutter:
        shape: [" T ", "SUS", " S "]
        ingredients: { T: STONECUTTER, S: STONE }
      smithing:
        shape: [" T ", "IUI", " I "]
        ingredients: { T: SMITHING_TABLE, I: IRON_INGOT }
      ender_link:
        shape: [" Y ", "OUO", " O "]
        ingredients: { Y: ENDER_EYE, O: OBSIDIAN }
      compacting:
        shape: ["III", "IUI", "III"]
        ingredients: { I: IRON_INGOT }
      smelting:
        shape: [" B ", "FUF", " B "]
        ingredients: { B: BLAZE_POWDER, F: FURNACE }
      blasting:
        shape: [" B ", "FUF", " B "]
        ingredients: { B: BLAZE_POWDER, F: BLAST_FURNACE }
      smoking:
        shape: [" C ", "SUS", " C "]
        ingredients: { C: CHARCOAL, S: SMOKER }
      recall:
        shape: ["EDE", "DUD", "EDE"]
        ingredients: { E: ENDER_PEARL, D: DIAMOND }
      trash:
        shape: [" C ", "CUC", " L "]
        ingredients: { C: CACTUS, L: LAVA_BUCKET }
      everlasting:
        shape: [" N ", "OUO", " O "]
        ingredients: { N: NETHERITE_INGOT, O: OBSIDIAN }

# ---------------------------------------------------------------------------
#  Externe Module / Hooks
#
#  Hooks aktivieren sich AUTOMATISCH, sobald das jeweilige Plugin installiert
#  und das Modul hier aktiviert ist (Standard: aktiviert). Fehlt das Plugin,
#  bleibt das Modul still inaktiv – das Plugin läuft weiterhin eigenständig.
#
#  Live-Status & Umschalten im Spiel über: /bp modules
#  Vault wird bewusst nicht unterstützt.
# ---------------------------------------------------------------------------
hooks:
  modules:
    placeholderapi: true    # Platzhalter (%ysbp_*%)
    oraxen: true            # Custom-Modelle/Texturen (einziger Item-Hook)
