# ---------------------------------------------------------------------------
#  Upgrades (Roadmap / vorbereitet)
#  In 0.0.1 noch nicht funktionsfähig. Dieser Abschnitt dient als Grundlage
#  für spätere Versionen. Siehe README -> Upgrade-Roadmap.
# ---------------------------------------------------------------------------
upgrades:
  enabled: false
  definitions:
    pickup:
      enabled: false
      permission: "yourshika.backpack.upgrade.pickup"
      custom-model-data: 2001
    magnet:
      enabled: false
      permission: "yourshika.backpack.upgrade.magnet"
      custom-model-data: 2002
    void:
      enabled: false
      permission: "yourshika.backpack.upgrade.void"
      custom-model-data: 2003
    refill:
      enabled: false
      permission: "yourshika.backpack.upgrade.refill"
      custom-model-data: 2004
    # ... weitere Upgrades folgen (Filter, Compacting, Smelting, Stack, ...).

# ---------------------------------------------------------------------------
#  Externe Hooks (alle optional – fehlt die Library, läuft das Plugin normal).
# ---------------------------------------------------------------------------
hooks:
  placeholderapi: true
  vault: false        # Economy-Anbindung (Roadmap)
  protocollib: false  # Fake-Blocks für platzierte Backpacks (Roadmap)
  itemsadder: false   # Custom-Modelle (Roadmap)
  oraxen: false       # Custom-Modelle (Roadmap)
