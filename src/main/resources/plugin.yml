name: yourShikaBackpacks
version: '${project.version}'
main: de.yourshika.backpacks.YourShikaBackpacks
api-version: '1.21'
author: yourShika
description: Eigenständiges, serverseitiges Backpack-System (inspiriert von Sophisticated Backpacks).
website: https://github.com/yourShika/yourShika-Backpacks
folia-supported: false

# Optionale Module – brechen das Plugin nicht, wenn sie nicht vorhanden sind.
# Sie laden zur Laufzeit automatisch, sobald das jeweilige Plugin installiert
# und das Modul in config.yml unter hooks.modules aktiviert ist. Vault wird
# bewusst NICHT mehr unterstützt.
softdepend:
  - PlaceholderAPI
  - Oraxen

commands:
  backpack:
    description: Hauptbefehl des Backpack-Plugins.
    usage: /backpack help
    aliases: [bp, ybackpack, ysbackpack]

permissions:
  yourshika.backpack.*:
    description: Alle Backpack-Berechtigungen.
    default: op
    children:
      yourshika.backpack.use: true
      yourshika.backpack.open: true
      yourshika.backpack.list: true
      yourshika.backpack.place: true
      yourshika.backpack.rename: true
      yourshika.backpack.locate: true
      yourshika.backpack.transfer: true
      yourshika.backpack.craft.*: true
      yourshika.backpack.admin.*: true

  yourshika.backpack.use:
    description: Backpacks grundsätzlich benutzen.
    default: true
  yourshika.backpack.open:
    description: Eigenes Backpack öffnen.
    default: true
  yourshika.backpack.list:
    description: Eigene Backpacks auflisten.
    default: true
  yourshika.backpack.rename:
    description: Eigenes Backpack umbenennen (sofern in der Config erlaubt).
    default: true
  yourshika.backpack.locate:
    description: Eigene platzierte Backpacks orten.
    default: true
  yourshika.backpack.transfer:
    description: Eigenes Backpack an andere Spieler übertragen.
    default: true

  yourshika.backpack.craft.*:
    description: Alle Backpack-Tiers craften.
    default: true
    children:
      yourshika.backpack.craft.leather: true
      yourshika.backpack.craft.copper: true
      yourshika.backpack.craft.iron: true
      yourshika.backpack.craft.gold: true
      yourshika.backpack.craft.diamond: true
      yourshika.backpack.craft.emerald: true
      yourshika.backpack.craft.netherite: true
  yourshika.backpack.craft.leather: { default: true }
  yourshika.backpack.craft.copper: { default: true }
  yourshika.backpack.craft.iron: { default: true }
  yourshika.backpack.craft.gold: { default: true }
  yourshika.backpack.craft.diamond: { default: true }
  yourshika.backpack.craft.emerald: { default: true }
  yourshika.backpack.craft.netherite: { default: true }

  yourshika.backpack.admin.*:
    description: Alle Admin-Funktionen.
    default: op
    children:
      yourshika.backpack.admin.give: true
      yourshika.backpack.admin.color: true
      yourshika.backpack.admin.openid: true
      yourshika.backpack.admin.openother: true
      yourshika.backpack.admin.listother: true
      yourshika.backpack.admin.locateother: true
      yourshika.backpack.admin.transfer: true
      yourshika.backpack.admin.rename: true
      yourshika.backpack.admin.assets: true
      yourshika.backpack.admin.doctor: true
      yourshika.backpack.admin.stats: true
      yourshika.backpack.admin.purge: true
      yourshika.backpack.admin.audit: true
      yourshika.backpack.admin.reload: true
      yourshika.backpack.admin.modules: true
      yourshika.backpack.admin.update: true
      yourshika.backpack.admin.debug: true
  yourshika.backpack.admin.give: { default: op }
  yourshika.backpack.admin.color: { default: op }
  yourshika.backpack.admin.openid: { default: op }
  yourshika.backpack.admin.openother: { default: op }
  yourshika.backpack.admin.listother: { default: op }
  yourshika.backpack.admin.locateother: { default: op }
  yourshika.backpack.admin.transfer: { default: op }
  yourshika.backpack.admin.rename: { default: op }
  yourshika.backpack.admin.assets: { default: op }
  yourshika.backpack.admin.doctor: { default: op }
  yourshika.backpack.admin.stats: { default: op }
  yourshika.backpack.admin.purge: { default: op }
  yourshika.backpack.admin.audit: { default: op }
  yourshika.backpack.admin.reload: { default: op }
  yourshika.backpack.admin.modules: { default: op }
  yourshika.backpack.admin.update: { default: op }
  yourshika.backpack.admin.debug: { default: op }

  # Backpacks platzieren (Shift-Rechtsklick auf den Boden).
  yourshika.backpack.place:
    description: Backpacks platzieren.
    default: true
  # Upgrade-Items in Backpacks legen.
  yourshika.backpack.upgrade:
    description: Upgrade-Slots eines Backpacks nutzen.
    default: true
